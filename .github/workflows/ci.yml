# CI: Build and validate on push/PR
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: serve 404.html for unknown routes so client-side router can show 404 page
      - name: Create 404.html for SPA
        run: cp dist/index.html dist/404.html

      - name: Upload build artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
