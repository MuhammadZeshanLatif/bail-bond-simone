name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for prerender
        run: npx puppeteer browsers install chrome

      - name: Build static site
        run: npm run build

      - name: List prerendered pages
        run: cat dist/prerender-manifest.json

      - name: Upload dist backup (manual deploy fallback)
        uses: actions/upload-artifact@v4
        with:
          name: static-site-dist
          path: dist/
          retention-days: 7

      # Hostinger often blocks GitHub Actions SSH (i/o timeout on port 65002).
      # FTPS uses port 21 and is more reliable from CI runners.
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: domains/away2freedom302.com/public_html/
          log-level: verbose
          dangerous-clean-slate: false
