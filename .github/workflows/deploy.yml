name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for prerender
        run: npx puppeteer browsers install chrome

      - name: Build static site
        run: npm run build

      - name: List prerendered pages
        run: cat dist/prerender-manifest.json

      - name: Pack dist for upload
        run: tar -czf deploy.tar.gz -C dist .

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: echo "SSH connection OK"

      - name: Upload build archive
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Extract on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            tar -xzf /tmp/deploy.tar.gz -C "${{ secrets.SSH_REMOTE_PATH }}"
            rm -f /tmp/deploy.tar.gz
            echo "Deploy complete → ${{ secrets.SSH_REMOTE_PATH }}"
