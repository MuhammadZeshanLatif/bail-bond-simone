name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for prerender
        run: npx puppeteer browsers install chrome

      - name: Build static site
        run: npm run build

      - name: List prerendered pages
        run: cat dist/prerender-manifest.json

      - name: Upload dist backup (manual deploy fallback)
        uses: actions/upload-artifact@v4
        with:
          name: static-site-dist
          path: dist/
          retention-days: 7

      - name: Create deploy archive
        run: tar -czf dist.tar.gz -C dist .

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 2m
          script: echo "SSH connection OK"

      - name: Upload dist archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: dist.tar.gz
          target: ${{ secrets.SSH_REMOTE_PATH }}
          timeout: 120s

      - name: Extract on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd ${{ secrets.SSH_REMOTE_PATH }}
            tar -xzf dist.tar.gz
            rm -f dist.tar.gz
            echo "Deploy complete"
