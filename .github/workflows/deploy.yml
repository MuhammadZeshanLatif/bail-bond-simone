name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_HOST_VAR: ${{ secrets.SSH_HOST }}
          SSH_PORT_VAR: ${{ secrets.SSH_PORT }}
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -e rsync -avz --delete -e "ssh -p $SSH_PORT_VAR -o StrictHostKeyChecking=no" dist/ "$SSH_USER@$SSH_HOST_VAR:/home/u932362804/domains/away2freedom302.com/public_html/"
