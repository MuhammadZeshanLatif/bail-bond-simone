<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Handcuffs Icon Design -->
  <defs>
    <linearGradient id="cuffGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5B47;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Left Handcuff -->
  <g transform="translate(25, 35)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="12" fill="url(#cuffGradient)" stroke="#8B7355" stroke-width="1.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Lock mechanism -->
    <rect x="-2" y="-6" width="4" height="4" fill="#1a1a1a" rx="1"/>
    <!-- Keyhole -->
    <circle cx="0" cy="0" r="2" fill="#1a1a1a"/>
    <rect x="-1" y="0" width="2" height="3" fill="#1a1a1a"/>
  </g>
  
  <!-- Right Handcuff -->
  <g transform="translate(75, 35)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="12" fill="url(#cuffGradient)" stroke="#8B7355" stroke-width="1.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Lock mechanism -->
    <rect x="-2" y="-6" width="4" height="4" fill="#1a1a1a" rx="1"/>
    <!-- Keyhole -->
    <circle cx="0" cy="0" r="2" fill="#1a1a1a"/>
    <rect x="-1" y="0" width="2" height="3" fill="#1a1a1a"/>
  </g>
  
  <!-- Chain Links -->
  <g stroke="url(#chainGradient)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Top chain link -->
    <path d="M 37 35 Q 50 30 63 35" />
    <!-- Middle chain link -->
    <path d="M 37 45 Q 50 50 63 45" />
    <!-- Bottom chain link -->
    <path d="M 37 55 Q 50 60 63 55" />
  </g>
  
  <!-- Text "Bail" -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D4AF37" text-anchor="middle">BAIL</text>
</svg>
